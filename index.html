<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Multi-Playlist</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; flex-wrap: wrap; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 12px; flex: 1; min-width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .player-section { flex: 1; min-width: 300px; position: sticky; top: 20px; height: fit-content; }
        input { width: 70%; padding: 12px; border: none; border-radius: 6px; background: #333; color: white; margin-bottom: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; background: #1DB954; color: white; font-weight: bold; }
        .item { background: #282828; margin-top: 10px; padding: 12px; display: flex; align-items: center; border-radius: 8px; gap: 8px; border: 1px solid #333; }
        .item span { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #b3b3b3; }
        .btn-del { background: #e91429; }
        .btn-play { background: #1DB954; }
        .btn-order { background: #404040; color: #fff; }
        iframe { width: 100%; border-radius: 12px; background: #000; min-height: 350px; }
    </style>
</head>
<body>

    <h1>🎵 Multi-Link Player</h1>

    <div class="container">
        <div class="controls">
            <input type="text" id="urlInput" placeholder="Pega link de YouTube, Spotify o SoundCloud...">
            <button onclick="agregar()">Añadir</button>
            <div id="lista"></div>
        </div>

        <div class="player-section">
            <div id="contenedorPlayer">
                <div style="background:#282828; height:350px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#b3b3b3; border-radius:12px; border: 2px dashed #444;">
                    <p>Listo para reproducir</p>
                    <small>YouTube • Spotify • SoundCloud</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playlist = JSON.parse(localStorage.getItem('multi_playlist') || '[]');

        function guardar() {
            localStorage.setItem('multi_playlist', JSON.stringify(playlist));
            render();
        }

        function agregar() {
            const val = document.getElementById('urlInput').value.trim();
            if (val) {
                playlist.push(val);
                document.getElementById('urlInput').value = '';
                guardar();
            }
        }

        function eliminar(index) {
            playlist.splice(index, 1);
            guardar();
        }

        function mover(index, dir) {
            const item = playlist.splice(index, 1)[0];
            playlist.splice(index + dir, 0, item);
            guardar();
        }

        function reproducir(url) {
            const contenedor = document.getElementById('contenedorPlayer');
            
            // LÓGICA PARA SPOTIFY
            if (url.includes('spotify.com')) {
                // Convertimos URL normal a URL de Embed
                const embedUrl = url.replace("spotify.com/", "spotify.com/embed/");
                contenedor.innerHTML = `<iframe src="${embedUrl}" width="100%" height="350" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
            } 
            
            // LÓGICA PARA SOUNDCLOUD
            else if (url.includes('soundcloud.com')) {
                contenedor.innerHTML = `<iframe width="100%" height="350" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff5500&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>`;
            } 
            
            // LÓGICA PARA YOUTUBE
            else {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = url.match(regex);
                const id = match ? match[1] : null;

                if (id) {
                    contenedor.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&origin=${window.location.origin}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                } else {
                    alert("Formato de URL no reconocido");
                }
            }
        }

        function render() {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            playlist.forEach((url, i) => {
                let icono = "🔗";
                if(url.includes("youtube") || url.includes("youtu.be")) icono = "🔴";
                if(url.includes("spotify")) icono = "🟢";
                if(url.includes("soundcloud")) icono = "🟠";

                div.innerHTML += `
                    <div class="item">
                        <span>${icono} ${url}</span>
                        <button class="btn-order" onclick="mover(${i}, -1)" ${i===0?'disabled':''}>↑</button>
                        <button class="btn-order" onclick="mover(${i}, 1)" ${i===playlist.length-1?'disabled':''}>↓</button>
                        <button class="btn-play" onclick="reproducir('${url}')">▶</button>
                        <button class="btn-del" onclick="eliminar(${i})">✖</button>
                    </div>`;
            });
        }

        render();
    </script>
</body>
</html>
