<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Playlist Pro Final</title>
    <style>
        :root { --primary-color: #1DB954; --bg-color: #121212; --container-bg: #1e1e1e; --item-bg: #282828; --text-main: #ffffff; --text-dim: #b3b3b3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; flex-wrap: wrap; }
        .controls { background: var(--container-bg); padding: 20px; border-radius: 12px; flex: 1; min-width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .player-section { flex: 1; min-width: 300px; position: sticky; top: 15px; height: fit-content; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border: 2px solid transparent; border-radius: 8px; background: #333; color: white; outline: none; font-size: 16px; }
        input[type="text"]:focus { border-color: var(--primary-color); }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #btnAdd { background: var(--primary-color); color: white; width: 100%; margin-bottom: 10px; }
        .btn-local { background: #333; color: #1DB954; border: 1px solid #1DB954; width: 100%; font-size: 13px; margin-bottom: 15px; }
        .share-group { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .btn-secondary { background: #404040; color: white; flex: 1; font-size: 11px; text-transform: uppercase; }
        .item { background: var(--item-bg); margin-top: 10px; padding: 12px; display: flex; align-items: center; border-radius: 10px; gap: 10px; border: 1px solid #333; }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .info strong { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info small { font-size: 11px; color: var(--text-dim); }
        .btn-order { background: #333; color: #fff; font-size: 12px; width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0; }
        .btn-play { background: var(--primary-color); color: white; padding: 8px 14px; border-radius: 20px; flex-shrink: 0; }
        .btn-del { background: transparent; color: #ff4444; font-size: 20px; padding: 0 5px; }
        #player-wrapper { width: 100%; border-radius: 12px; background: #000; min-height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #333; }
        audio { width: 90%; }
        iframe { width: 100%; height: 350px; border: none; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.5rem; margin-bottom: 20px;">🎵 Multi-Playlist Pro v9</h1>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Nombre de la canción...">
                <input type="text" id="urlInput" placeholder="Link de Drive, Dropbox, YT, Spotify...">
                <button id="btnAdd" onclick="agregar()">Añadir Link</button>
                
                <button class="btn-local" onclick="document.getElementById('fileInput').click()">📁 MP3 Local (Se guarda en navegador)</button>
                <input type="file" id="fileInput" style="display: none;" accept="audio/*" onchange="subirArchivoLocal(event)">
            </div>

            <div id="lista"></div>

            <div class="share-group">
                <button class="btn-secondary" onclick="exportarLista()">📤 Exportar JSON</button>
                <button class="btn-secondary" onclick="document.getElementById('importInput').click()">📥 Importar JSON</button>
                <input type="file" id="importInput" style="display: none;" onchange="importarLista(event)" accept=".json">
            </div>
        </div>

        <div class="player-section">
            <div id="player-wrapper">
                <div style="text-align: center; color: #888; padding: 20px;">
                    <p>Soporta Links y Archivos</p>
                    <small>Asegúrate de que los links de Drive sean públicos</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playlist = JSON.parse(localStorage.getItem('multi_playlist_v9') || '[]');
        
        // --- BASE DE DATOS LOCAL ---
        let db;
        const request = indexedDB.open("MusicDB", 1);
        request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("songs", { keyPath: "id" }); };
        request.onsuccess = e => { db = e.target.result; render(); };

        function guardar() {
            localStorage.setItem('multi_playlist_v9', JSON.stringify(playlist));
            render();
        }

        function agregar() {
            const url = document.getElementById('urlInput').value.trim();
            const name = document.getElementById('nameInput').value.trim() || "Sin título";
            if (url) {
                playlist.push({ name, url, type: 'web', id: Date.now() });
                document.getElementById('urlInput').value = '';
                document.getElementById('nameInput').value = '';
                guardar();
            }
        }

        function subirArchivoLocal(event) {
            const file = event.target.files[0];
            if (!file) return;
            const id = "local-" + Date.now();
            const transaction = db.transaction(["songs"], "readwrite");
            transaction.objectStore("songs").add({ id, data: file });
            transaction.oncomplete = () => {
                playlist.push({ name: file.name, url: id, type: 'local', id: Date.now() });
                guardar();
            };
        }

        async function reproducir(item) {
            const wrapper = document.getElementById('player-wrapper');
            wrapper.innerHTML = '<p style="color:white">Cargando...</p>';

            if (item.type === 'local') {
                const transaction = db.transaction(["songs"], "readonly");
                const store = transaction.objectStore("songs");
                const req = store.get(item.url);
                req.onsuccess = () => {
                    if (req.result) {
                        const blobUrl = URL.createObjectURL(req.result.data);
                        wrapper.innerHTML = `<audio controls autoplay src="${blobUrl}"></audio>`;
                    } else { alert("Archivo local no encontrado en este dispositivo."); }
                };
            } else {
                let url = item.url;
                // DRIVE
                if (url.includes('drive.google.com')) {
                    const driveId = url.match(/\/d\/([^/]+)/)?.[1] || url.match(/id=([^&]+)/)?.[1];
                    const directUrl = `https://docs.google.com/uc?export=open&id=${driveId}`;
                    wrapper.innerHTML = `<audio controls autoplay src="${directUrl}" onerror="alert('Error: Asegúrate de que el link de Drive es público')"></audio>`;
                } 
                // DROPBOX
                else if (url.includes('dropbox.com')) {
                    const dropboxUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').split('?')[0] + '?raw=1';
                    wrapper.innerHTML = `<audio controls autoplay src="${dropboxUrl}"></audio>`;
                }
                // SPOTIFY
                else if (url.includes('spotify.com')) {
                    const embedUrl = url.replace("/track/", "/embed/track/").replace("/playlist/", "/embed/playlist/").split('?')[0];
                    wrapper.innerHTML = `<iframe src="${embedUrl}" allow="encrypted-media"></iframe>`;
                }
                // SOUNDCLOUD
                else if (url.includes('soundcloud.com')) {
                    wrapper.innerHTML = `<iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true"></iframe>`;
                }
                // YOUTUBE
                else {
                    const idMatch = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
                    if (idMatch) wrapper.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${idMatch[1]}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                }
            }
        }

        function eliminar(index) {
            if (confirm("¿Eliminar canción?")) {
                const item = playlist[index];
                if (item.type === 'local') {
                    const transaction = db.transaction(["songs"], "readwrite");
                    transaction.objectStore("songs").delete(item.url);
                }
                playlist.splice(index, 1);
                guardar();
            }
        }

        function mover(index, dir) {
            const item = playlist.splice(index, 1)[0];
            playlist.splice(index + dir, 0, item);
            guardar();
        }

        // --- IMPORTAR / EXPORTAR MEJORADO ---
        function exportarLista() {
            if (playlist.length === 0) return alert("La lista está vacía");
            const dataStr = JSON.stringify(playlist, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'mi_playlist_pro.json';
            link.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function importarLista(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    let contenido = e.target.result;
                    // Limpieza extrema para móviles y PC
                    const inicio = contenido.indexOf('[');
                    const fin = contenido.lastIndexOf(']');
                    if (inicio === -1 || fin === -1) throw new Error();
                    
                    const nuevaLista = JSON.parse(contenido.substring(inicio, fin + 1));
                    if (confirm("¿Sobrescribir lista actual?")) {
                        playlist = nuevaLista;
                        guardar();
                    }
                } catch (err) {
                    alert("Error: El archivo no es un JSON de playlist válido.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function render() {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            playlist.forEach((item, i) => {
                let icono = item.type === 'local' ? "📁" : 
                           (item.url.includes("drive") ? "☁️" : 
                           (item.url.includes("spotify") ? "🟢" : 
                           (item.url.includes("soundcloud") ? "🟠" : "🔴")));
                
                div.innerHTML += `
                    <div class="item">
                        <div class="info">
                            <strong>${icono} ${item.name}</strong>
                            <small>${item.type === 'local' ? 'Archivo Local' : 'Enlace Web'}</small>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-order" onclick="mover(${i}, -1)" ${i===0?'disabled':''}>▲</button>
                            <button class="btn-order" onclick="mover(${i}, 1)" ${i===playlist.length-1?'disabled':''}>▼</button>
                            <button class="btn-play" onclick='reproducir(${JSON.stringify(item)})'>▶</button>
                            <button class="btn-del" onclick="eliminar(${i})">✖</button>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
