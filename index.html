<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Multi-Playlist Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; flex-wrap: wrap; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 12px; flex: 1; min-width: 320px; }
        .player-section { flex: 1; min-width: 320px; position: sticky; top: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: none; border-radius: 6px; background: #333; color: white; border: 2px solid transparent; outline: none; }
        input:focus { border-color: #1DB954; } /* Resalte verde al escribir */
        button#btnAdd { padding: 12px; cursor: pointer; border: none; border-radius: 6px; background: #1DB954; color: white; font-weight: bold; transition: 0.2s; }
        button#btnAdd:hover { background: #1ed760; transform: scale(1.02); }
        .item { background: #282828; margin-top: 10px; padding: 12px; display: flex; align-items: center; border-radius: 8px; gap: 10px; border: 1px solid #333; }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .info strong { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info small { font-size: 11px; color: #888; }
        .btn-order { background: #333; color: #fff; font-size: 14px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: none; cursor: pointer; }
        .btn-order:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-play { background: #1DB954; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-del { background: transparent; color: #ff4444; border: none; cursor: pointer; font-size: 18px; }
        iframe { width: 100%; border-radius: 12px; background: #000; min-height: 350px; border: none; }
    </style>
</head>
<body>

    <h1>🎵 Mi Playlist Personalizada</h1>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Nombre de la canción...">
                <input type="text" id="urlInput" placeholder="Pega link de YouTube, Spotify o SoundCloud...">
                <button id="btnAdd" onclick="agregar()">+ Añadir (Enter)</button>
            </div>
            <div id="lista"></div>
        </div>

        <div class="player-section">
            <div id="contenedorPlayer">
                <div style="background:#282828; height:350px; display:flex; align-items:center; justify-content:center; color:#b3b3b3; border-radius:12px; border: 2px dashed #444;">
                    Listo para reproducir
                </div>
            </div>
        </div>
    </div>

    <script>
        let playlist = JSON.parse(localStorage.getItem('multi_playlist_titles') || '[]');

        function guardar() {
            localStorage.setItem('multi_playlist_titles', JSON.stringify(playlist));
            render();
        }

        function agregar() {
            const url = document.getElementById('urlInput').value.trim();
            const name = document.getElementById('nameInput').value.trim() || "Sin título";
            if (url) {
                playlist.push({ name: name, url: url });
                document.getElementById('urlInput').value = '';
                document.getElementById('nameInput').value = '';
                guardar();
                document.getElementById('nameInput').focus(); // Vuelve el foco al primer input
            }
        }

        // --- DETECTAR ENTER ---
        [document.getElementById('nameInput'), document.getElementById('urlInput')].forEach(input => {
            input.addEventListener("keypress", (e) => { if (e.key === "Enter") agregar(); });
        });

        function eliminar(index) { playlist.splice(index, 1); guardar(); }
        function mover(index, dir) { 
            const item = playlist.splice(index, 1)[0]; 
            playlist.splice(index + dir, 0, item); 
            guardar(); 
        }

        function reproducir(url) {
            const contenedor = document.getElementById('contenedorPlayer');
            if (url.includes('spotify.com')) {
                const embedUrl = url.replace("/track/", "/embed/track/").replace("/playlist/", "/embed/playlist/");
                contenedor.innerHTML = `<iframe src="${embedUrl}" width="100%" height="350" allow="encrypted-media"></iframe>`;
            } else if (url.includes('soundcloud.com')) {
                contenedor.innerHTML = `<iframe width="100%" height="350" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true&visual=true"></iframe>`;
            } else {
                const id = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                if (id) contenedor.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            }
        }

        function render() {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            playlist.forEach((item, i) => {
                let icono = item.url.includes("spotify") ? "🟢" : (item.url.includes("soundcloud") ? "🟠" : "🔴");
                div.innerHTML += `
                    <div class="item">
                        <div class="info"><strong>${icono} ${item.name}</strong><small>${item.url.substring(0, 35)}...</small></div>
                        <button class="btn-order" onclick="mover(${i}, -1)" ${i===0?'disabled':''}>▲</button>
                        <button class="btn-order" onclick="mover(${i}, 1)" ${i===playlist.length-1?'disabled':''}>▼</button>
                        <button class="btn-play" onclick="reproducir('${item.url}')">▶</button>
                        <button class="btn-del" onclick="eliminar(${i})">✖</button>
                    </div>`;
            });
        }
        render();
    </script>
</body>
</html>
